<!DOCTYPE html>
<html>
<head>
  <title>Login</title>

  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f5f5f5;
      font-family: Arial;
    }

    .login-box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: black;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    #error {
      color: red;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="login-box">
  <h2>Login</h2>

  <input type="text" id="username" placeholder="Enter Username">
  <input type="password" id="password" placeholder="Enter Password">

<a href="login.html">
  <button class="login">Login</button>
</a>
  <p id="error"></p>
</div>

<!-- 🔥 JAVASCRIPT INSIDE SAME FILE -->
<script>
  function login() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    // simple demo login
    if (user === "yashika@gmail.com" && pass === "1234") {
      localStorage.setItem("loggedIn", "true");
      localStorage.setItem("user", user);

      alert("Login Successful 🎉");

      // redirect to home page
      window.location.href = "index.html";
    } else {
      document.getElementById("error").innerText =
        "Invalid Username or Password ❌";
    }
  }
</script>

</body>
</html>
